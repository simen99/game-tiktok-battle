<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAP BATTLE GAME FREE</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-neon: #00f3ff;
            --pink-neon: #ff007f;
            --bg-dark: #07070f;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #111126 0%, #07070f 100%);
        }

        /* OVERLAY PANEL HUD (Atas Layar) */
        .hud-overlay {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(10, 10, 22, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 10px 15px;
            text-align: center;
            z-index: 50;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .hud-title {
            font-size: 1.15rem;
            font-weight: 800;
            color: #fff;
            margin: 0 0 8px 0;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
        }

        .hud-instructions {
            display: flex;
            justify-content: space-between;
            gap: 6px;
        }

        .hud-pill {
            flex: 1;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 4px 6px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .pill-tap {
            border-color: rgba(255, 255, 255, 0.2);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        .pill-boys {
            border-color: rgba(0, 243, 255, 0.4);
            color: #00f3ff;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.3);
        }

        .pill-girls {
            border-color: rgba(255, 0, 127, 0.4);
            color: #ff007f;
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.3);
        }

        /* BATTLE ARENA */
        .battle-arena {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .team-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: flex 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
        }

        .team-pane::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: 45px 45px;
            opacity: 0.06;
            pointer-events: none;
        }

        #boys-pane {
            background: linear-gradient(180deg, rgba(0, 122, 255, 0.2) 0%, rgba(0, 243, 255, 0.02) 100%);
            border-bottom: 2px solid rgba(0, 243, 255, 0.2);
        }
        #boys-pane::before {
            background-image: linear-gradient(to right, var(--blue-neon) 1px, transparent 1px),
                              linear-gradient(to bottom, var(--blue-neon) 1px, transparent 1px);
        }

        #girls-pane {
            background: linear-gradient(0deg, rgba(255, 0, 127, 0.2) 0%, rgba(255, 0, 127, 0.02) 100%);
            border-top: 2px solid rgba(255, 0, 127, 0.2);
        }
        #girls-pane::before {
            background-image: linear-gradient(to right, var(--pink-neon) 1px, transparent 1px),
                              linear-gradient(to bottom, var(--pink-neon) 1px, transparent 1px);
        }

        .team-tag {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 0;
            z-index: 5;
        }

        #boys-pane .team-tag {
            color: #fff;
            text-shadow: 0 0 10px var(--blue-neon);
        }

        #girls-pane .team-tag {
            color: #fff;
            text-shadow: 0 0 10px var(--pink-neon);
        }

        .score-display {
            font-size: 5rem;
            font-weight: 800;
            margin-top: 5px;
            z-index: 5;
            transition: transform 0.1s ease;
        }

        #boys-pane .score-display {
            color: #00f3ff;
            text-shadow: 0 0 12px rgba(0, 243, 255, 0.7);
        }

        #girls-pane .score-display {
            color: #ff007f;
            text-shadow: 0 0 12px rgba(255, 0, 127, 0.7);
        }

        .team-avatar {
            font-size: 4.2rem;
            margin-bottom: 5px;
            animation: floatAnimation 3.5s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.15));
            z-index: 5;
        }
        #girls-pane .team-avatar {
            animation-delay: 1.75s;
        }

        @keyframes floatAnimation {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .vs-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65px;
            height: 65px;
            background: #090916;
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 1.6rem;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            z-index: 20;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.06); box-shadow: 0 0 20px rgba(0, 243, 255, 0.5); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        /* NOTIFIKASI RINGKAS (Mini-Toasts) */
        .toast-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 320px;
            max-height: 140px;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
            z-index: 100;
            pointer-events: none;
        }

        .toast {
            background: rgba(10, 10, 22, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-left: 4px solid #fff;
            padding: 8px 12px;
            margin: 3px 0;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #e2e2ff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            animation: slideIn 0.25s ease-out forwards, fadeOut 1.5s 2s forwards;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toast.boys-action { border-left-color: var(--blue-neon); }
        .toast.girls-action { border-left-color: var(--pink-neon); }

        @keyframes slideIn {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <!-- OVERLAY INSTRUKSI -->
    <div class="hud-overlay">
        <h1 class="hud-title">TAP BATTLE GAME FREE</h1>
        <div class="hud-instructions">
            <span class="hud-pill pill-tap">📱 Tap = Random</span>
            <span class="hud-pill pill-boys">🧑🏻 Boys = 1</span>
            <span class="hud-pill pill-girls">👩🏻 Girls = 2</span>
        </div>
    </div>

    <!-- ARENA PERMAINAN -->
    <div class="battle-arena">
        <div id="boys-pane" class="team-pane">
            <div class="team-avatar">🧑🏻‍💻</div>
            <h1 class="team-tag">BOYS</h1>
            <div id="boys-score" class="score-display">50</div>
        </div>
        
        <div class="vs-badge">VS</div>
        
        <div id="girls-pane" class="team-pane">
            <div class="team-avatar">👩🏻‍💻</div>
            <h1 class="team-tag">GIRLS</h1>
            <div id="girls-score" class="score-display">50</div>
        </div>
    </div>

    <!-- WIDGET NOTIFIKASI MINI -->
    <div id="toasts" class="toast-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        let boysScore = 50; 
        let girlsScore = 50;

        const boysPane = document.getElementById('boys-pane');
        const girlsPane = document.getElementById('girls-pane');
        const boysScoreElem = document.getElementById('boys-score');
        const girlsScoreElem = document.getElementById('girls-score');
        const toastContainer = document.getElementById('toasts');

        function updateUI() {
            const total = boysScore + girlsScore;
            const boysPercent = Math.max(15, Math.min(85, (boysScore / total) * 100));
            const girlsPercent = 100 - boysPercent;

            boysPane.style.flex = boysPercent;
            girlsPane.style.flex = girlsPercent;

            boysScoreElem.innerText = Math.round(boysScore);
            girlsScoreElem.innerText = Math.round(girlsScore);

            boysScoreElem.style.transform = "scale(1.08)";
            girlsScoreElem.style.transform = "scale(1.08)";
            setTimeout(() => {
                boysScoreElem.style.transform = "scale(1)";
                girlsScoreElem.style.transform = "scale(1)";
            }, 80);

            if (boysPercent >= 83) {
                showToast("🎉 TEAM BOYS MENANG MUTLAK! Reset...", "blue");
                resetGame();
            } else if (girlsPercent >= 83) {
                showToast("🎉 TEAM GIRLS MENANG MUTLAK! Reset...", "pink");
                resetGame();
            }
        }

        function resetGame() {
            boysScore = 50;
            girlsScore = 50;
            setTimeout(updateUI, 2500);
        }

        // Fungsi menampilkan notifikasi mini
        function showToast(message, color = "white") {
            // Batasi jumlah notifikasi aktif agar tidak menumpuk memenuhi layar
            if (toastContainer.children.length >= 3) {
                toastContainer.removeChild(toastContainer.firstChild);
            }

            const toast = document.createElement('div');
            toast.className = 'toast';
            if (color === "blue") toast.className += " boys-action";
            if (color === "pink") toast.className += " girls-action";
            toast.innerText = message;
            
            toastContainer.appendChild(toast);

            // Bersihkan elemen otomatis setelah animasi selesai
            setTimeout(() => {
                toast.remove();
            }, 3500);
        }

        socket.on('teamJoined', (data) => {
            const teamColor = data.team === 'boys' ? 'blue' : 'pink';
            const textSource = data.isRandom ? "diacak masuk" : "masuk";
            showToast(`👥 @${data.username} ${textSource} Tim ${data.team.toUpperCase()}`, teamColor);
        });

        socket.on('pointsAdded', (data) => {
            const points = data.points;
            if (data.team === 'boys') {
                boysScore += points;
            } else {
                girlsScore += points;
            }

            const actionText = data.type === 'gift' ? `Gift ${data.giftName} (+${points})` : `Tap (+${points})`;
            const teamColor = data.team === 'boys' ? 'blue' : 'pink';
            showToast(`⚡ @${data.username}: ${actionText}`, teamColor);
            updateUI();
        });

        updateUI();
    </script>
</body>
</html>
